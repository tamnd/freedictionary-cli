# GoReleaser turns one tag push into everything a user might install from: raw
# archives, Linux packages (deb, rpm, apk), a multi-arch container image, and
# entries for the package managers (Homebrew, Scoop). `git tag vX.Y.Z && git
# push --tags` fans out to all of them through .github/workflows/release.yml.
#
# Publish steps that push to a repository you do not own yet (the Homebrew tap,
# the Scoop bucket) self-disable when their token is absent. A release with no
# extra secrets still produces every downloadable artifact and the container
# image; each manager lights up the moment its repository and token exist.
version: 2

project_name: freedictionary

before:
  hooks:
    - go mod download

builds:
  - id: freedictionary
    binary: freedictionary
    main: ./cmd/freedictionary
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tamnd/freedictionary-cli/cli.Version={{ .Version }}
      - -X github.com/tamnd/freedictionary-cli/cli.Commit={{ .ShortCommit }}
      - -X github.com/tamnd/freedictionary-cli/cli.Date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    targets:
      - linux_amd64
      - linux_arm64
      - linux_arm_7
      - linux_386
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
      - windows_arm64
      - freebsd_amd64
      - freebsd_arm64

archives:
  - id: default
    name_template: "freedictionary_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: linux-packages
    package_name: freedictionary
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: tamnd
    homepage: https://github.com/tamnd/freedictionary-cli
    maintainer: Duc-Tam Nguyen <tamnd87@gmail.com>
    description: A command line for the Free Dictionary API.
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk

dockers:
  - image_templates:
      - ghcr.io/tamnd/freedictionary:{{ .Version }}-amd64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=A command line for the Free Dictionary API."
      - "--label=org.opencontainers.image.url=https://github.com/tamnd/freedictionary-cli"
      - "--label=org.opencontainers.image.source=https://github.com/tamnd/freedictionary-cli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
    goarch: amd64
  - image_templates:
      - ghcr.io/tamnd/freedictionary:{{ .Version }}-arm64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=A command line for the Free Dictionary API."
      - "--label=org.opencontainers.image.url=https://github.com/tamnd/freedictionary-cli"
      - "--label=org.opencontainers.image.source=https://github.com/tamnd/freedictionary-cli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
    goarch: arm64

docker_manifests:
  - name_template: ghcr.io/tamnd/freedictionary:{{ .Version }}
    image_templates:
      - ghcr.io/tamnd/freedictionary:{{ .Version }}-amd64
      - ghcr.io/tamnd/freedictionary:{{ .Version }}-arm64
  - name_template: ghcr.io/tamnd/freedictionary:latest
    image_templates:
      - ghcr.io/tamnd/freedictionary:{{ .Version }}-amd64
      - ghcr.io/tamnd/freedictionary:{{ .Version }}-arm64

homebrew_casks:
  - name: freedictionary
    repository:
      owner: tamnd
      name: homebrew-tap
      token: '{{ envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "" }}'
    directory: Casks
    homepage: https://github.com/tamnd/freedictionary-cli
    description: A command line for the Free Dictionary API.
    skip_upload: '{{ if envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

scoops:
  - repository:
      owner: tamnd
      name: scoop-bucket
      token: '{{ envOrDefault "SCOOP_BUCKET_GITHUB_TOKEN" "" }}'
    homepage: https://github.com/tamnd/freedictionary-cli
    description: A command line for the Free Dictionary API.
    license: Apache-2.0
    skip_upload: '{{ if envOrDefault "SCOOP_BUCKET_GITHUB_TOKEN" "" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archive
    artifacts: archive

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: tamnd
    name: freedictionary-cli
  draft: false
  prerelease: auto
